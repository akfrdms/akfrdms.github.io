<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Info</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Raleway', Arial, Helvetica, sans-serif;
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.container{
    width:80%;
    max-width:1000px;
    margin-top:40px;
}

.game-header{
    display:flex;
    gap:40px;
    align-items:flex-start;
}

.game-image{
    width:300px;
    height:450px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    border:3px solid #333;
    box-shadow:0 0 15px rgba(255,255,255,0.08);
}

.game-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.game-info{
    flex:1;
}

.game-title{
    font-size:36px;
    font-weight:bold;
    margin-bottom:20px;
}

.meta{
    margin-bottom:5px;
    color:#ccc;
}

.section{
    margin-top:25px;
}

.section-title{
    font-size:20px;
    margin-bottom:10px;
}

.long {
    line-height: 1.6;
    color: #ddd;
    white-space: pre-wrap;
}

/* ✅ 플랫폼 아이콘 크게 + 아래 배치 */
.platform-container {
    margin-top: 10px;
    display: flex;
    gap: 20px;
}

.platform-icon {
    width: 85px;
    height: 85px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.platform-icon:hover {
    transform: scale(1.1);
}

/* ✅ 유튜브 아래 크게 */
.video-container {
    margin-top: 50px;
    width: 100%;
}

.video-container iframe {
    width: 80%;
    max-width: 600px;
    aspect-ratio: 16/9;
    border-radius:10px;
    border:2px solid #333;
}

.back{
    margin-top:50px;
}

.back a{
    color:#aaa;
    text-decoration:none;
}

.back a:hover{
    color:white;
}

/* Privacy Policy */
.privacy-policy {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    z-index: 1000;
}

.privacy-policy:hover {
    color: white;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<div class="game-header">

<div class="game-image">
<img id="headImage">
</div>

<div class="game-info">

<div class="game-title" id="name"></div>

<div class="meta"><b>Genre:</b> <span id="genre"></span></div>

<!-- ✅ GameStart 분리 -->
<div class="meta"><b>GameStart:</b></div>
<div id="platform" class="platform-container"></div>

<div class="section">
<div class="section-title">Short Description</div>
<div id="short"></div>
</div>

</div>
</div>

<!-- ✅ 유튜브 헤더 아래로 이동 -->
<div class="video-container">
<iframe id="youtubeVideo"
src=""
frameborder="0"
allowfullscreen>
</iframe>
</div>

<!-- Contact -->
<div class="section">
<div class="section-title">Contact</div>
<div class="long">
If you have any issues or feedback, please contact us at the email. 
We will get back to you as soon as possible.
<a href="mailto:tlsdbs1118@gmail.com">tlsdbs1118@gmail.com</a>
</div>
</div>

<div class="section">
<div class="section-title">About</div>
<div id="long" class="long"></div>
</div>

<div class="back">
<a href="../index.html">← Back</a>
</div>

</div>

<div id="privacyPolicy" class="privacy-policy" style="display:none;">Privacy Policy</div>

<script>
function getGameName() {
    const params = new URLSearchParams(window.location.search);
    return params.get("game");
}

const platformLogos = {
    "iOS": "platformLogo/AppStore.png",
    "Android": "platformLogo/PlayStore.png",
    "Steam": "platformLogo/Steam.png"
};

function createPlatformIcons(info) {
    const container = document.getElementById("platform");
    container.innerHTML = "";

    if(info.appstore){
        const img = document.createElement("img");
        img.src = platformLogos["iOS"];
        img.className = "platform-icon";
        img.onclick = () => window.open(info.appstore, "_blank");
        container.appendChild(img);
    }

    if(info.playstore){
        const img = document.createElement("img");
        img.src = platformLogos["Android"];
        img.className = "platform-icon";
        img.onclick = () => window.open(info.playstore, "_blank");
        container.appendChild(img);
    }

    if(info.steam){
        const img = document.createElement("img");
        img.src = platformLogos["Steam"];
        img.className = "platform-icon";
        img.onclick = () => window.open(info.steam, "_blank");
        container.appendChild(img);
    }
}

fetch("gamesiteinfo.json")
.then(response => response.json())
.then(data => {
    const game = getGameName();
    const info = data[game];

    if(!info) return;

    document.getElementById("name").textContent = info.name;
    document.getElementById("genre").textContent = info.genre;
    document.getElementById("short").textContent = info.short;
    document.getElementById("long").textContent = info.long;
    document.getElementById("headImage").src = info.head;

    if(info.youtube){
        document.getElementById("youtubeVideo").src = info.youtube;
    }

    if(info.privacypolicy){
        const pp = document.getElementById("privacyPolicy");
        pp.style.display = "block";
        pp.onclick = () => window.open(info.privacypolicy, "_blank");
    }

    createPlatformIcons(info);
});
</script>

</body>
</html>
