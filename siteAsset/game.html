<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Raleway', Arial, Helvetica, sans-serif;
    background: #000;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ✅ 좌측 상단 미니 로고 */
.top-nav {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 1001;
}

.top-nav img {
    width: 60px; /* 작게 조절 */
    height: auto;
    opacity: 1;
    transition: opacity 0.2s ease;
}

.top-nav img:hover {
    opacity: 1;
}

.container {
    width: 90%;
    max-width: 800px;
    margin-top: 80px; /* 로고 공간 확보를 위해 여백 살짝 증가 */
    margin-bottom: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

/* 상단 헤더: 아이콘 + 제목 */
.game-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
}

/* 앱 아이콘 + 반투명 테두리 */
.game-icon {
    width: 100px;
    height: 100px;
    border-radius: 22px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.2); 
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

.game-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.game-title {
    font-size: 36px;
    font-weight: bold;
    margin: 0;
}

/* 플랫폼 아이콘 중앙 정렬 */
.platform-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 35px;
}

.platform-icon {
    height: 48px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.platform-icon:hover {
    transform: scale(1.08);
}

.short-description {
    font-size: 16px;
    line-height: 1.7;
    color: #bbb;
    margin-bottom: 50px;
    max-width: 600px;
}

.video-container {
    width: 100%;
    margin-bottom: 60px;
}

.video-container iframe {
    width: 100%;
    max-width: 700px;
    aspect-ratio: 16/9;
    border-radius: 12px;
    border: 1px solid #333;
}

.contact-section {
    width: 100%;
    border-top: 1px solid #222;
    padding-top: 40px;
    font-size: 14px;
    color: #777;
}

.contact-section a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
}

.back {
    margin-top: 50px;
}

.back a {
    color: #b1b1b1;
    text-decoration: none;
    font-size: 14px;
}

.back a:hover { color: white; }

.privacy-policy {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 12px;
    color: #929292;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- ✅ 좌상단 로고 추가 -->
<nav class="top-nav">
    <a href="../index.html">
        <img src="../siteAsset/siteTitle.png" alt="Marimori Home">
    </a>
</nav>

<div class="container">
    <div class="game-header">
        <div class="game-icon">
            <img id="headImage" src="" alt="Game Icon">
        </div>
        <h1 class="game-title" id="name"></h1>
    </div>

    <div id="platform" class="platform-container"></div>
    <div id="short" class="short-description"></div>

    <div class="video-container">
        <iframe id="youtubeVideo" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="contact-section">
        Contact: <a href="mailto:tlsdbs1118@gmail.com">tlsdbs1118@gmail.com</a>
    </div>

    <div class="back">
        <a href="../index.html">← Back to Home</a>
    </div>
</div>

<div id="privacyPolicy" class="privacy-policy" style="display:none;">Privacy Policy</div>

<script>
// 기존 스크립트와 동일 (데이터 페칭 및 아이콘 생성)
function getGameName() {
    const params = new URLSearchParams(window.location.search);
    return params.get("game");
}

const platformLogos = {
    "iOS": "platformLogo/AppStore.png",
    "Android": "platformLogo/PlayStore.png",
    "Steam": "platformLogo/Steam.png"
};

function createPlatformIcons(info) {
    const container = document.getElementById("platform");
    container.innerHTML = "";
    const platforms = [
        { key: 'appstore', logo: 'iOS' },
        { key: 'playstore', logo: 'Android' },
        { key: 'steam', logo: 'Steam' }
    ];

    platforms.forEach(p => {
        if (info[p.key]) {
            const img = document.createElement("img");
            img.src = platformLogos[p.logo];
            img.className = "platform-icon";
            img.onclick = () => window.open(info[p.key], "_blank");
            container.appendChild(img);
        }
    });
}

fetch("gamesiteinfo.json")
.then(response => response.json())
.then(data => {
    const game = getGameName();
    const info = data[game];
    if(!info) return;

    document.getElementById("name").textContent = info.name;
    document.getElementById("short").textContent = info.short;
    document.getElementById("headImage").src = info.head;

    if(info.youtube){
        document.getElementById("youtubeVideo").src = info.youtube;
    }

    if(info.privacypolicy){
        const pp = document.getElementById("privacyPolicy");
        pp.style.display = "block";
        pp.onclick = () => window.open(info.privacypolicy, "_blank");
    }

    createPlatformIcons(info);
});
</script>

</body>
</html>
